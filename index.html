    <button class="nav-menu-toggle" aria-label="菜单" aria-expanded="false"><span></span></button>

    <section class="hero page-content">

      <h1 class="hero-title">尺 度</h1>
      <p class="hero-subtitle">探索宇宙万物的维度</p>
      <p class="hero-desc">
        从普朗克长度的量子泡沫到可观测宇宙的恢弘边界，从大爆炸的创世瞬间到此刻的静谧星空，
        从绝对零度的量子基态到普朗克温度的创世烈焰——一切皆是尺度。
      </p>

      <div class="page-search">
        <div class="page-search-wrapper">
          <input type="text" class="page-search-input" placeholder="搜索全站尺度...">
          <span class="page-search-icon">🔍</span>
          <span class="page-search-hint">/</span>
          <div class="page-search-results"></div>
        </div>
      </div>

      <div class="cards-grid">
        <a href="pages/space.html" class="card space-card">
          <span class="card-icon">🔭</span>
          <span class="card-title">空间尺度</span>
          <span class="card-desc">从微观粒子到可观测宇宙，<span class="scale-stat" data-scale="space" data-stat="count">101</span>个尺度节点，跨越<span class="scale-stat" data-scale="space" data-stat="orders">61</span>个数量级</span>
          <span class="card-arrow">开始探索 →</span>
        </a>
        <a href="pages/time.html" class="card time-card">
          <span class="card-icon">⏳</span>
          <span class="card-title">时间尺度</span>

        </a>
        <a href="pages/energy.html" class="card energy-card">

          <span class="card-title">能量尺度</span>
          <span class="card-desc">从绝对零度到创世之热，<span class="scale-stat" data-scale="energy" data-stat="count">93</span>个温度节点，跨越<span class="scale-stat" data-scale="energy" data-stat="orders">7</span>个数量级</span>
          <span class="card-arrow">开始探索 →</span>
        </a>
