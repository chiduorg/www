            window.location.href = 'energy-detail.html?id=' + prevItem.id;
          }
          if (e.key === 'ArrowRight' && nextItem) {
            window.location.href = 'energy-detail.html?id=' + nextItem.id;
          }
        });
      }).catch(function() { container.innerHTML = '<div class="error-state"><div class="error-state-icon">⚠️</div><div class="error-state-text">加载失败，请检查网络连接</div><button class="error-state-btn" onclick="location.reload()">重新加载</button></div>'; });
    })();
  </script>
